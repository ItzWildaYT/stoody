<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS Boot</title>

<style>
body { margin:0; font-family:Arial,sans-serif; overflow:hidden; background:#000; color:#e2e8f0; }

.boot { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; }
.logo { font-size:2rem; font-weight:800; color:#38bdf8; }
.loading { margin-top:20px; width:200px; height:4px; background:#1e293b; border-radius:999px; overflow:hidden; }
.bar { width:0%; height:100%; background:#38bdf8; }

.desktop { display:none; width:100vw; height:100vh; background:radial-gradient(circle,#1e293b,#0f172a); position:relative; }

.taskbar { position:absolute; bottom:0; left:0; right:0; height:45px; background:rgba(0,0,0,0.6); display:flex; align-items:center; padding:0 10px; }
.start { background:#38bdf8; color:#0f172a; padding:6px 10px; border-radius:6px; font-weight:bold; cursor:pointer; }
.clock { margin-left:auto; font-size:0.9rem; opacity:0.8; }

.window { position:absolute; top:80px; left:80px; width:400px; background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); border-radius:12px; box-shadow:0 0 25px rgba(0,0,0,0.6); }
.title { padding:10px; background:rgba(0,0,0,0.4); border-radius:12px 12px 0 0; font-weight:bold; }
.content { padding:15px; }

.big { font-size:1.2rem; font-weight:800; color:#38bdf8; margin-bottom:10px; }
.timer { font-size:1.8rem; font-weight:900; margin:10px 0; }
.exam { opacity:0.9; margin-bottom:5px; }

.badge { display:inline-block; margin-top:10px; padding:5px 10px; border-radius:999px; background:#38bdf8; color:#0f172a; font-weight:bold; }

.warn { color:#fbbf24; font-weight:bold; }
.danger { color:#ef4444; font-weight:bold; }

.barwrap { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden; margin-top:10px; }
.fill { height:100%; width:0%; background:#38bdf8; }
</style>

</head>

<body>

<div class="boot" id="boot">
  <div class="logo">StudyOS</div>
  <div class="loading"><div class="bar" id="loadBar"></div></div>
</div>

<div class="desktop" id="desktop">

  <div class="window">
    <div class="title">Stoodying</div>

    <div class="content">
      <div class="big">I KNEW YOU WERE GAY! NOW LET ME STUDY.</div>

      <div class="exam" id="examName">Loading exam...</div>
      <div class="timer" id="timer">--</div>

      <div id="alert"></div>

      <div class="barwrap"><div class="fill" id="fill"></div></div>

      <div class="badge">FOCUS MODE ACTIVE</div>
    </div>
  </div>

  <div class="taskbar">
    <div class="start">Start</div>
    <div class="clock" id="clock"></div>
  </div>

</div>

<script>

let load = 0;
const bootInterval = setInterval(() => {
  load += 2;
  document.getElementById("loadBar").style.width = load + "%";
  if(load >= 100){
    clearInterval(bootInterval);
    document.getElementById("boot").style.display = "none";
    document.getElementById("desktop").style.display = "block";
  }
}, 30);

const exams = [
  { name:"Exam 1", time:new Date("2026-06-16T11:30:00") },
  { name:"Exam 2", time:new Date("2026-06-17T08:15:00") },
  { name:"Exam 3", time:new Date("2026-06-19T08:15:00") }
];

function nextExam(){
  return exams.find(e => e.time > new Date()) || null;
}

function format(ms){
  let s = Math.max(0, ms/1000);
  let d = Math.floor(s/86400); s%=86400;
  let h = Math.floor(s/3600); s%=3600;
  let m = Math.floor(s/60);
  let sec = Math.floor(s%60);
  return `${d}d ${h}h ${m}m ${sec}s`;
}

function update(){

  const exam = nextExam();
  const now = new Date();

  if(!exam){
    document.getElementById("examName").innerText = "All exams completed 🎉";
    document.getElementById("timer").innerText = "0d 0h 0m 0s";
    return;
  }

  const diff = exam.time - now;

  document.getElementById("examName").innerText = exam.name + " → NEXT";
  document.getElementById("timer").innerText = format(diff);

  let alert = "";

  if(diff < 3600000){
    alert = "<div class='danger'>CRITICAL: Less than 1 hour left</div>";
  } else if(diff < 86400000){
    alert = "<div class='warn'>WARNING: Less than 24 hours left</div>";
  }

  document.getElementById("alert").innerHTML = alert;

  const totalWindow = 1000*60*60*24*10;
  const progress = Math.max(0, Math.min(100, 100 - (diff/totalWindow)*100));
  document.getElementById("fill").style.width = progress + "%";

  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}

setInterval(update,1000);
update();

</script>

</body>
</html>
