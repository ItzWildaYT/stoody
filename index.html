<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS 11</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#000;color:#fff;overflow:hidden}
.screen{position:fixed;inset:0}
#boot{display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000}
.logo{font-size:48px;font-weight:700}
.spinner{width:42px;height:42px;border:4px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-top:24px}
@keyframes spin{to{transform:rotate(360deg)}}
#login{display:none;background:linear-gradient(135deg,#0f172a,#1e293b);justify-content:center;align-items:center;flex-direction:column}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:30px;border-radius:20px;width:340px;text-align:center}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-top:12px}
button{width:100%;padding:12px;border:none;border-radius:10px;margin-top:12px;cursor:pointer}
#error{color:#ff6b6b;height:20px}
#desktop{display:none;background:linear-gradient(135deg,#0b1220,#172554)}
.taskbar{position:absolute;bottom:0;left:0;right:0;height:58px;background:rgba(20,20,20,.75);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;gap:16px}
.icon{width:42px;height:42px;background:#ffffff22;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.window{position:absolute;top:60px;left:80px;width:85vw;height:78vh;background:#111827;border-radius:18px;display:none;overflow:hidden;border:1px solid #ffffff22}
.titlebar{height:48px;background:#1f2937;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
iframe{width:100%;height:calc(100% - 48px);border:none}
.content{padding:20px}
.timer{font-size:32px;font-weight:700}
</style>
</head>
<body>
<div id="boot" class="screen">
<div class="logo">StudyOS 11</div>
<div class="spinner"></div>
</div>

<div id="login" class="screen">
<div class="card">
<h2>Welcome</h2>
<p>Password required</p>
<input id="pw" type="password" placeholder="Enter password">
<button onclick="doLogin()">Sign In</button>
<div id="error"></div>
</div>
</div>

<div id="desktop" class="screen">
<div id="study" class="window">
<div class="titlebar"><span>Study Dashboard</span><span onclick="closeWin('study')" style="cursor:pointer">✕</span></div>
<div class="content">
<h1>NOW LET ME STUDY.</h1>
<div id="exam"></div>
<div id="count" class="timer"></div>
</div>
</div>

<div id="youtube" class="window">
<div class="titlebar"><span>YouTube</span><span onclick="closeWin('youtube')" style="cursor:pointer">✕</span></div>
<iframe src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
</div>

<div id="discord" class="window">
<div class="titlebar"><span>Discord</span><span onclick="closeWin('discord')" style="cursor:pointer">✕</span></div>
<iframe src="https://discord.com/app"></iframe>
</div>

<div class="taskbar">
<div class="icon" onclick="openWin('study')">📚</div>
<div class="icon" onclick="openWin('youtube')">▶️</div>
<div class="icon" onclick="openWin('discord')">💬</div>
</div>
</div>

<script>
setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("login").style.display = "flex";
}, 3000);

function doLogin(){
 if(pw.value==='1234'){login.style.display='none';desktop.style.display='block'}
 else{error.textContent='Incorrect password';pw.value=''}
}

function openWin(id){document.getElementById(id).style.display='block'}
function closeWin(id){document.getElementById(id).style.display='none'}

const exams=[
{name:'Exam 1',time:new Date('2026-06-16T11:30:00')},
{name:'Exam 2',time:new Date('2026-06-17T08:15:00')},
{name:'Exam 3',time:new Date('2026-06-19T08:15:00')}
];

function update(){
 let ex=exams.find(e=>e.time>new Date());
 if(!ex){exam.textContent='All exams completed';count.textContent='🎉';return;}
 let d=ex.time-new Date();
 let s=Math.floor(d/1000),days=Math.floor(s/86400);s%=86400;
 let h=Math.floor(s/3600);s%=3600;
 let m=Math.floor(s/60);let sec=s%60;
 exam.textContent=ex.name+' - Next Exam';
 count.textContent=`${days}d ${h}h ${m}m ${sec}s`;
}
setInterval(update,1000);update();
</script>
</body>
</html>
