<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS</title>

<style>
body { margin:0; font-family:Arial,sans-serif; overflow:hidden; background:#0b1220; color:#e2e8f0; }
.desktop { width:100vw; height:100vh; background:radial-gradient(circle at top,#1e293b,#0f172a); position:relative; }
.taskbar { position:absolute; bottom:0; left:0; right:0; height:50px; background:rgba(0,0,0,0.6); display:flex; align-items:center; padding:0 10px; }
.startBtn { background:#38bdf8; color:#0f172a; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; }
.time { margin-left:auto; font-size:0.9rem; opacity:0.8; }
.window { position:absolute; width:420px; background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); border-radius:12px; box-shadow:0 0 30px rgba(0,0,0,0.6); top:80px; left:80px; }
.titlebar { padding:10px; background:rgba(0,0,0,0.4); border-radius:12px 12px 0 0; display:flex; justify-content:space-between; cursor:move; }
.content { padding:15px; }
.btn { background:#38bdf8; color:#0f172a; padding:8px 10px; border-radius:6px; display:inline-block; margin-top:10px; cursor:pointer; font-weight:bold; }
.startMenu { position:absolute; bottom:55px; left:10px; width:220px; background:rgba(0,0,0,0.85); border-radius:10px; padding:10px; display:none; }
.app { padding:8px; border-radius:6px; cursor:pointer; }
.app:hover { background:rgba(255,255,255,0.1); }
.big { font-size:1.2rem; font-weight:800; color:#38bdf8; margin-bottom:10px; }
.timer { font-size:1.6rem; font-weight:900; margin:10px 0; }
.badge { display:inline-block; margin-top:10px; padding:5px 10px; border-radius:999px; background:#38bdf8; color:#0f172a; font-weight:bold; }
.warn { color:#fbbf24; font-weight:bold; }
.danger { color:#ef4444; font-weight:bold; }
.bar { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden; margin-top:10px; }
.fill { height:100%; width:0%; background:#38bdf8; }
.lock { position:absolute; inset:0; background:rgba(0,0,0,0.85); display:flex; justify-content:center; align-items:center; flex-direction:column; font-size:1.5rem; font-weight:900; display:none; }
</style>

</head>

<body>

<div class="desktop">

  <div class="startMenu" id="startMenu">
    <div class="app" onclick="openApp()">📊 Study Control Panel</div>
    <div class="app">🧠 Focus Mode</div>
    <div class="app">📚 Notes (blocked)</div>
  </div>

  <div class="window" id="appWindow">
    <div class="titlebar">
      <span>Study Control Panel</span>
      <span onclick="closeApp()" style="cursor:pointer;">✖</span>
    </div>

    <div class="content">
      <div class="big">NOW LET ME STUDY.</div>

      <div id="examName">Loading exam...</div>
      <div class="timer" id="timer">--</div>

      <div id="alert"></div>

      <div class="bar"><div class="fill" id="bar"></div></div>

      <div class="badge">STUDY OS ACTIVE</div>

      <div class="btn" onclick="toggleLock()">ENTER FULL FOCUS LOCK</div>
    </div>
  </div>

  <div class="taskbar">
    <div class="startBtn" onclick="toggleStart()">Start</div>
    <div class="time" id="clock"></div>
  </div>

  <div class="lock" id="lockScreen">
    🔒 FOCUS LOCK ENABLED<br><br>
    NOW LET ME STUDY.
    <div class="btn" onclick="toggleLock()" style="margin-top:20px;">Exit Lock</div>
  </div>

</div>

<script>
const exams=[
  {name:"Exam 1", time:new Date("2026-06-16T11:30:00")},
  {name:"Exam 2", time:new Date("2026-06-17T08:15:00")},
  {name:"Exam 3", time:new Date("2026-06-19T08:15:00")}
];

function nextExam(){
  return exams.find(e=>e.time>new Date())||null;
}

function format(ms){
  let s=Math.max(0,ms/1000);
  let d=Math.floor(s/86400);s%=86400;
  let h=Math.floor(s/3600);s%=3600;
  let m=Math.floor(s/60);
  let sec=Math.floor(s%60);
  return `${d}d ${h}h ${m}m ${sec}s`;
}

function update(){
  const exam=nextExam();
  const now=new Date();

  if(!exam){
    document.getElementById("examName").innerText="All exams complete 🎉";
    document.getElementById("timer").innerText="0d 0h 0m 0s";
    return;
  }

  const diff=exam.time-now;

  document.getElementById("examName")=document.getElementById("examName");
  document.getElementById("examName").innerText=`${exam.name} → NEXT`;

  document.getElementById("timer").innerText=format(diff);

  let alert="";
  if(diff<3600000) alert="<div class='danger'>CRITICAL: <1 hour</div>";
  else if(diff<86400000) alert="<div class='warn'>WARNING: <24 hours</div>";

  document.getElementById("alert").innerHTML=alert;

  let total=1000*60*60*24*10;
  let progress=Math.max(0,Math.min(100,100-(diff/total)*100));
  document.getElementById("bar").style.width=progress+"%";

  const nowClock=new Date();
  document.getElementById("clock").innerText=nowClock.toLocaleTimeString();
}

function toggleStart(){
  const m=document.getElementById("startMenu");
  m.style.display=m.style.display==="block"?"none":"block";
}

function openApp(){
  document.getElementById("appWindow").style.display="block";
}

function closeApp(){
  document.getElementById("appWindow").style.display="none";
}

function toggleLock(){
  const l=document.getElementById("lockScreen");
  l.style.display=l.style.display==="flex"?"none":"flex";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
